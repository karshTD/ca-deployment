services:
  # 1. Backend Web Service (Flask)
  - type: web
    name: contract-analyzer-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: ca-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      # We will set FRONTEND_URL and ALLOWED_ORIGINS directly in the dashboard 
      # once the static site generates its unique URL.

  # 2. Celery Worker (Background processing)
  - type: worker
    name: contract-analyzer-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery worker --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: ca-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  # 3. Frontend Static Site (React/Vite)
  - type: web
    name: contract-analyzer-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # We will specify VITE_API_BASE_URL manually on the dashboard or use relative routes

  # 4. Managed Redis Instance
  - type: redis
    name: ca-redis
    plan: free
    ipAllowList: []